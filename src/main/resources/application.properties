# Do not define any DEV/TEST so we get dev services
%prod.quarkus.datasource.username=rivieradev
%prod.quarkus.datasource.password=rivieradev
%prod.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5435/rivieradev-2026

# we have rather large talk abstracts, I've seen 8kb abstracts, this is for backoffice
quarkus.http.limits.max-form-attribute-size=10M

# Make sure we honor proxy headers
quarkus.http.proxy.proxy-address-forwarding=true

quarkus.locales=en,fr
quarkus.default-locale=en

quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true

quarkus.web-bundler.bundle.main=true
quarkus.web-bundler.bundle.live=true
quarkus.web-bundler.bundle.common=true
quarkus.web-bundler.bundle.app=false
quarkus.web-bundler.bundle.fishmarket=true
quarkus.web-bundler.bundling.splitting=false

#quarkus.log.category."io.quarkiverse.web.bundler".level=DEBUG

# Latest is V3 but it's not supported by our prod server :-/
quarkus.native.march=x86-64-v2

# Start with prod data
%dev.dev-auto-setup.url=https://2026.rivieradev.fr/Serialiser/json

# RivieraDEV base URL for talk links
rivieradev.base-url=https://2026.rivieradev.fr

# Buffer GraphQL API configuration
buffer.api.url=https://api.buffer.com
buffer.api.key=${BUFFER_API_KEY:}
quarkus.smallrye-graphql-client.buffer.url=${buffer.api.url}
quarkus.smallrye-graphql-client.buffer.header.Authorization=Bearer ${buffer.api.key}

# Mailer configuration
quarkus.mailer.from=info@rivieradev.fr
%prod.quarkus.mailer.host=${SMTP_HOST}
%prod.quarkus.mailer.port=${SMTP_PORT:587}
%prod.quarkus.mailer.username=${SMTP_USERNAME:}
%prod.quarkus.mailer.password=${SMTP_PASSWORD:}
%prod.quarkus.mailer.start-tls=REQUIRED

# Google Gemini AI configuration
quarkus.langchain4j.ai.gemini.api-key=${GEMINI_API_KEY:}
quarkus.langchain4j.ai.gemini.chat-model.model-id=gemini-3.1-flash-lite
quarkus.langchain4j.ai.gemini.chat-model.temperature=0.7
